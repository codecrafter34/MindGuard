# IBM Code Engine — Frontend Application
# Deploy with:
#   ibmcloud ce application create --file frontend-app.yaml

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: mindguard-frontend
  namespace: mindguard
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "5"
    spec:
      containerConcurrency: 100
      containers:
        - image: icr.io/YOUR_NAMESPACE/mindguard-frontend:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
